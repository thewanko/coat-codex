# wrangler.toml — ローカル開発（wrangler pages dev / d1 / r2）用設定。
# 本番PagesはRoot=/構成のためこのファイルを読まない（ビルド設定・bindingsの正は
# dashboard側: Settings → Bindings に DB / BUCKET を設定すること）。
name = "coat-scriptorium"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "coat-scriptorium-db"
database_id = "9405d72d-0de5-4acc-b23a-2b7c626e7b52"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "coat-scriptorium-images"

# AI は ST-29（NSFW スクリーニング）用。本番は dashboard 側 Settings → Bindings で
# Workers AI を設定すること（このファイルはローカル開発専用・上部コメント参照）。
[ai]
binding = "AI"
